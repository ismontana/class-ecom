<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      overflow: hidden;
    }

    /* ===== LAYOUT ===== */
    #layout {
      height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 260px;
      transition: width .25s ease;
    }

    #sidebar.collapsed {
      width: 72px;
    }

    #sidebar.collapsed .nav-link span,
    #sidebar.collapsed .sidebar-title {
      display: none;
    }

    /* ===== SCROLL SOLO MAIN ===== */
    #app {
      overflow-y: auto;
      height: calc(100vh - 56px);
    }

    /* ===== AVATAR ===== */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* ===== SEARCH MOBILE ===== */
    #mobileSearch {
      display: none;
    }

    @media (max-width: 767px) {
      #mobileSearch.show {
        display: block;
      }
    }
  </style>
</head>

<body class="bg-light">

<div id="layout" class="d-flex">

  <!-- ================= SIDEBAR DESKTOP ================= -->
  <aside id="sidebar" class="bg-white border-end d-none d-lg-flex flex-column">

    <div class="d-flex align-items-center justify-content-between p-3 border-bottom">
      <strong class="sidebar-title">Admin</strong>

      <button id="toggleSidebar" class="btn btn-sm btn-light">
        <i class="fa-solid fa-angle-left"></i>
      </button>
    </div>

    <nav class="nav flex-column p-2 gap-1 flex-grow-1">

      <a class="nav-link zoom-102 active" data-page="dashboard" role="button">
        <i class="fa-solid fa-chart-line me-2"></i><span>Dashboard</span>
      </a>

      <a class="nav-link zoom-102" data-page="pedidos" role="button">
        <i class="fa-solid fa-receipt me-2"></i><span>Pedidos</span>
      </a>

      <a class="nav-link zoom-102" data-page="productos" role="button">
        <i class="fa-solid fa-box me-2"></i><span>Productos</span>
      </a>

      <a class="nav-link zoom-102" data-page="integraciones" role="button">
        <i class="fa-solid fa-plug me-2"></i><span>Integraciones</span>
      </a>

      <a class="nav-link zoom-102 mt-auto" data-page="perfil" role="button">
        <i class="fa-solid fa-user me-2"></i><span>Perfil</span>
      </a>

    </nav>
  </aside>


  <!-- ================= CONTENT ================= -->
  <div class="flex-grow-1 d-flex flex-column">

    <!-- ============ NAVBAR ============ -->
    <header class="navbar">

      <!-- MENU MOBILE -->
      <button class="btn btn-light d-lg-none me-2"
        data-bs-toggle="offcanvas"
        data-bs-target="#mobileSidebar">
        <i class="fa-solid fa-bars"></i>
      </button>
    </header>

    <!-- ============ MAIN SCROLLABLE ============ -->
    <main id="app" class="container-fluid p-3"></main>

  </div>
</div>


<!-- ================= SIDEBAR MOBILE ================= -->
<div class="offcanvas offcanvas-start" id="mobileSidebar">
  <div class="offcanvas-header">
    <h5>Admin</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body p-2">
    <nav class="nav flex-column gap-1">
      <a class="nav-link active" data-page="dashboard">Dashboard</a>
      <a class="nav-link" data-page="pedidos">Pedidos</a>
      <a class="nav-link" data-page="productos">Productos</a>
      <a class="nav-link" data-page="integraciones">Integraciones</a>
      <a class="nav-link" data-page="perfil">Perfil</a>
    </nav>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const app = document.getElementById("app");

  async function loadPage(page) {
    const res = await fetch(page + ".html");
    app.innerHTML = await res.text();

    const offcanvas = bootstrap.Offcanvas.getInstance(
      document.getElementById("mobileSidebar")
    );
    if (offcanvas) offcanvas.hide();

    document.querySelectorAll(".nav-link").forEach(link => {
      link.classList.toggle("active", link.dataset.page === page);
    });
  }

  document.querySelectorAll("[data-page]").forEach(el => {
    el.addEventListener("click", e => {
      e.preventDefault();
      loadPage(el.dataset.page);
    });
  });

  loadPage("dashboard");

  /* ===== SIDEBAR COLLAPSE DESKTOP ===== */
  const sidebar = document.getElementById("sidebar");
  const toggleBtn = document.getElementById("toggleSidebar");
  const icon = toggleBtn.querySelector("i");

  toggleBtn.addEventListener("click", () => {
    sidebar.classList.toggle("collapsed");
    icon.classList.toggle("fa-angle-left");
    icon.classList.toggle("fa-angle-right");
  });
</script>

</body>
</html>
